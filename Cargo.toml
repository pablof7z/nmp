[workspace]
resolver = "2"
members = [
    "nmp-grammar",
    "nmp-store",
    "nmp-resolver",
    "nmp-router",
    "nmp-transport",
    "nmp-signer",
    "nmp-engine",
    "nmp-demo",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[workspace.dependencies]
nostr = "0.44.4"
nmp-grammar = { path = "nmp-grammar" }
nmp-store = { path = "nmp-store" }
nmp-resolver = { path = "nmp-resolver" }
nmp-router = { path = "nmp-router" }
nmp-transport = { path = "nmp-transport" }
nmp-signer = { path = "nmp-signer" }
nmp-engine = { path = "nmp-engine" }
proptest = "1"
