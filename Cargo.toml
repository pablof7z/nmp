[workspace]
resolver = "2"
members = [
    "crates/nmp-grammar",
    "crates/nmp-store",
    "crates/nmp-resolver",
    "crates/nmp-router",
    "crates/nmp-transport",
    "crates/nmp-signer",
    "crates/nmp-engine",
    "crates/nmp-demo",
    "crates/nmp-ffi",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[workspace.dependencies]
nostr = "0.44.4"
nmp-grammar = { path = "crates/nmp-grammar" }
nmp-store = { path = "crates/nmp-store" }
nmp-resolver = { path = "crates/nmp-resolver" }
nmp-router = { path = "crates/nmp-router" }
nmp-transport = { path = "crates/nmp-transport" }
nmp-signer = { path = "crates/nmp-signer" }
nmp-engine = { path = "crates/nmp-engine" }
proptest = "1"
uniffi = "0.29"
