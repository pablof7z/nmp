# M5 falsifier app -- xcodegen project spec (committed; the generated
# .xcodeproj is NOT committed, see repo .gitignore / memory
# xcodegen-pbxproj-churn: xcodegen churns pbxproj UUIDs on every regen).
#
# Regenerate with: (cd apps/Falsifier && xcodegen generate)
name: Falsifier
options:
  bundleIdPrefix: com.nmp.falsifier
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
packages:
  NMP:
    path: ../../Packages/NMP
targets:
  Falsifier:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Falsifier
    dependencies:
      - package: NMP
        product: NMP
    info:
      path: Generated-Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Falsifier
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nmp.falsifier
        TARGETED_DEVICE_FAMILY: "1"
  FalsifierTests:
    # #465: the smallest maintainable repo-owned iOS simulator test host --
    # a unit-test bundle hosted inside the existing Falsifier app rather than
    # a new xcodegen spec. Runtime-qualifies NIP-11 hostname resolution
    # (Hickory DNS + HTTP through NMPEngine.relayInformation) on an actual
    # iOS Simulator process, not just the macOS `swift test` host.
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/FalsifierTests
    dependencies:
      - target: Falsifier
      - package: NMP
        product: NMP
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nmp.falsifier.tests
