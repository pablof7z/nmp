name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Deterministic regeneration runs in the ordinary pull_request trust domain,
  # never in pull_request_target. The separate trusted-base governance check
  # protects this workflow and every script it invokes from PR modification.
  surface-regeneration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Prepare base-trusted surface program (bootstrap uses proposed copy)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          TRUSTED_DIR: ${{ runner.temp }}/nmp-surface-regeneration
        run: |
          mkdir -p \
            "$TRUSTED_DIR/scripts" \
            "$TRUSTED_DIR/tools/component-interface-snapshot/src" \
            "$TRUSTED_DIR/tools/rust-facade-snapshot/src" \
            "$TRUSTED_DIR/tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/facade/src" \
            "$TRUSTED_DIR/tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/renamed-package/src" \
            "$TRUSTED_DIR/tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/nested-package/src"
          paths=(
            scripts/check-surface-governance.sh
            scripts/install-surface-tools.sh
            scripts/regenerate-surface-snapshots.sh
            scripts/test-install-surface-tools.sh
            scripts/test-surface-governance.sh
            tools/surface-toolchain.env
            tools/component-interface-snapshot/Cargo.toml
            tools/component-interface-snapshot/Cargo.lock
            tools/component-interface-snapshot/src/main.rs
            tools/rust-facade-snapshot/Cargo.toml
            tools/rust-facade-snapshot/Cargo.lock
            tools/rust-facade-snapshot/src/main.rs
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/Cargo.toml
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/Cargo.lock
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/facade/Cargo.toml
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/facade/src/lib.rs
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/renamed-package/Cargo.toml
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/renamed-package/src/lib.rs
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/nested-package/Cargo.toml
            tools/rust-facade-snapshot/tests/fixtures/renamed-workspace/nested-package/src/lib.rs
          )
          if git cat-file -e "$BASE_SHA:scripts/check-surface-governance.sh" 2>/dev/null; then
            for path in "${paths[@]}"; do
              git show "$BASE_SHA:$path" > "$TRUSTED_DIR/$path"
            done
          else
            for path in "${paths[@]}"; do
              cp "$path" "$TRUSTED_DIR/$path"
            done
          fi
          chmod +x "$TRUSTED_DIR/scripts/"*.sh

      - name: Install checksum-pinned surface tool
        env:
          SURFACE_ROOT: ${{ github.workspace }}
          SURFACE_TOOLCHAIN_ENV: ${{ runner.temp }}/nmp-surface-regeneration/tools/surface-toolchain.env
        working-directory: ${{ runner.temp }}/nmp-surface-regeneration
        run: ${{ runner.temp }}/nmp-surface-regeneration/scripts/install-surface-tools.sh

      - name: Falsify governance and installer
        run: |
          ${{ runner.temp }}/nmp-surface-regeneration/scripts/test-surface-governance.sh
          ${{ runner.temp }}/nmp-surface-regeneration/scripts/test-install-surface-tools.sh
          source ${{ runner.temp }}/nmp-surface-regeneration/tools/surface-toolchain.env
          RUSTUP_TOOLCHAIN="$SURFACE_RUST_TOOLCHAIN" cargo "+$SURFACE_RUST_TOOLCHAIN" test --locked \
            --manifest-path ${{ runner.temp }}/nmp-surface-regeneration/tools/rust-facade-snapshot/Cargo.toml

      - name: Compute changed projection context
        id: projections
        env:
          SURFACE_BASE_REF: ${{ github.event.pull_request.base.sha }}
          SURFACE_HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          value=$(${{ runner.temp }}/nmp-surface-regeneration/scripts/check-surface-governance.sh --print-projections)
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Regenerate and verify proposed surfaces
        env:
          SURFACE_BASE_REF: ${{ github.event.pull_request.base.sha }}
          SURFACE_HEAD_REF: ${{ github.event.pull_request.head.sha }}
          SURFACE_PR_NUMBER: ${{ github.event.pull_request.number }}
          SURFACE_PR_URL: ${{ github.event.pull_request.html_url }}
          SURFACE_CHANGED_PROJECTIONS: ${{ steps.projections.outputs.value }}
          SURFACE_REGEN_CMD: ${{ runner.temp }}/nmp-surface-regeneration/scripts/regenerate-surface-snapshots.sh
          SURFACE_TOOLCHAIN_ENV: ${{ runner.temp }}/nmp-surface-regeneration/tools/surface-toolchain.env
          SURFACE_COMPONENT_TOOL_DIR: ${{ runner.temp }}/nmp-surface-regeneration/tools/component-interface-snapshot
          SURFACE_RUST_FACADE_TOOL_DIR: ${{ runner.temp }}/nmp-surface-regeneration/tools/rust-facade-snapshot
          # Only effective while the base genuinely lacks the trusted program.
          SURFACE_BOOTSTRAP: 1
        run: ${{ runner.temp }}/nmp-surface-regeneration/scripts/check-surface-governance.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the exact toolchain (channel + components) pinned by
      # rust-toolchain.toml at the repo root.
      - name: Install pinned Rust toolchain
        run: rustup show

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (workspace, all targets, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace

  # Clean-clone Swift package smoke test (#18): `Packages/NMP/Package.swift`
  # depends on a binary xcframework + generated UniFFI bindings that are
  # deliberately NOT committed (see `.gitignore`/`Packages/NMP/README.md`).
  # This job starts from a genuinely fresh checkout every run, so it fails
  # loudly the moment that build-from-source path breaks -- exactly the
  # guarantee the acceptance criteria asks for.
  swift-package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Add Apple targets (sim + macOS slices)
        run: rustup target add aarch64-apple-ios-sim x86_64-apple-ios aarch64-apple-darwin

      - name: Build NMP.xcframework + generated bindings (sim-only, no signing needed)
        run: scripts/build-swift-xcframework.sh --sim-only

      - name: swift build
        run: swift build
        working-directory: Packages/NMP

      - name: swift test
        run: swift test
        working-directory: Packages/NMP

      # #465: runnable iOS Simulator qualification. `swift test` above only
      # proves the macOS SwiftPM host process; Hickory DNS/HTTP is
      # compile-qualified for iOS by the sim-only xcframework build but was
      # never RUN inside an actual iOS Simulator process. `apps/Falsifier`'s
      # xcodegen-generated `FalsifierTests` target (ported from
      # `RelayInformationTests.swift`'s `LocalNIP11Server` fixture) closes
      # that gap by executing a hostname NIP-11 acquisition through
      # `NMPEngine.relayInformation(for:policy:)` on a real simulator.
      - name: Install xcodegen
        run: command -v xcodegen >/dev/null 2>&1 || brew install xcodegen

      # The runner's DEFAULT active Xcode can be older than the pbxproj
      # format xcodegen emits (observed: default Xcode 15.4 refused a
      # freshly xcodegen-generated project as "a future Xcode project file
      # format"). Select the newest Xcode.app actually installed on the
      # runner instead of assuming a specific version is default, so this
      # does not go stale as GitHub updates the macOS image's bundled
      # Xcodes.
      - name: Select the newest installed Xcode
        run: |
          set -euo pipefail
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          latest=${latest:-/Applications/Xcode.app}
          echo "Selecting $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version

      - name: xcodegen generate (apps/Falsifier)
        run: xcodegen generate
        working-directory: apps/Falsifier

      - name: Resolve an iOS Simulator destination (#465)
        id: ios_sim
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available --json | python3 scripts/pick-ios-simulator-destination.py)
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: xcodebuild test (iOS Simulator NIP-11 runtime qualification, #465)
        run: |
          # `-retry-tests-on-failure`: observed locally, a simulator's first
          # cold boot occasionally truncates the fixture's very first loopback
          # HTTP response body (Network.framework/NECP simulator-only
          # initialization race, not reproducible on a warm simulator and not
          # present in the equivalent macOS-host `swift test` fixture this was
          # ported from). A real regression still fails after the retry
          # budget; this only absorbs the one-time cold-boot flake.
          xcodebuild test \
            -project Falsifier.xcodeproj \
            -scheme Falsifier \
            -destination "id=${{ steps.ios_sim.outputs.udid }}" \
            -retry-tests-on-failure \
            -test-iterations 3
        working-directory: apps/Falsifier

  # Clean-clone Kotlin/JVM falsifier smoke test (#40): `Packages/NMPKotlin`
  # depends on uniffi-bindgen-generated Kotlin bindings + a compiled native
  # cdylib that are deliberately NOT committed (see
  # `.gitignore`/`Packages/NMPKotlin/README.md`), same discipline as
  # `swift-package` above. Desktop JVM only -- this is the #40 falsifier,
  # not the M6 Android AAR (which needs cargo-ndk cross-compilation and is
  # gated on the M5 human verdict).
  kotlin-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Kotlin bindings + native lib (host triple)
        run: scripts/build-kotlin-jvm.sh

      - name: gradlew test
        run: ./gradlew test --console=plain
        working-directory: Packages/NMPKotlin
