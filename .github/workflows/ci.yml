name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the exact toolchain (channel + components) pinned by
      # rust-toolchain.toml at the repo root.
      - name: Install pinned Rust toolchain
        run: rustup show

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy (workspace, all targets, deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test (workspace)
        run: cargo test --workspace

  # Clean-clone Swift package smoke test (#18): `Packages/NMP/Package.swift`
  # depends on a binary xcframework + generated UniFFI bindings that are
  # deliberately NOT committed (see `.gitignore`/`Packages/NMP/README.md`).
  # This job starts from a genuinely fresh checkout every run, so it fails
  # loudly the moment that build-from-source path breaks -- exactly the
  # guarantee the acceptance criteria asks for.
  swift-package:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Add Apple targets (sim + macOS slices)
        run: rustup target add aarch64-apple-ios-sim x86_64-apple-ios aarch64-apple-darwin

      - name: Build NMP.xcframework + generated bindings (sim-only, no signing needed)
        run: scripts/build-swift-xcframework.sh --sim-only

      - name: swift build
        run: swift build
        working-directory: Packages/NMP

      - name: swift test
        run: swift test
        working-directory: Packages/NMP

  # Clean-clone Kotlin/JVM falsifier smoke test (#40): `Packages/NMPKotlin`
  # depends on uniffi-bindgen-generated Kotlin bindings + a compiled native
  # cdylib that are deliberately NOT committed (see
  # `.gitignore`/`Packages/NMPKotlin/README.md`), same discipline as
  # `swift-package` above. Desktop JVM only -- this is the #40 falsifier,
  # not the M6 Android AAR (which needs cargo-ndk cross-compilation and is
  # gated on the M5 human verdict).
  kotlin-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Kotlin bindings + native lib (host triple)
        run: scripts/build-kotlin-jvm.sh

      - name: gradlew test
        run: ./gradlew test --console=plain
        working-directory: Packages/NMPKotlin
