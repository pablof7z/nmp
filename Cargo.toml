[workspace]
resolver = "2"
members = [
    "nmp-grammar",
    "nmp-store",
    "nmp-resolver",
    "nmp-router",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[workspace.dependencies]
nostr = "0.44.4"
nmp-grammar = { path = "nmp-grammar" }
nmp-store = { path = "nmp-store" }
nmp-resolver = { path = "nmp-resolver" }
proptest = "1"
