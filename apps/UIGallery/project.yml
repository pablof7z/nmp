# Real NMP UI Gallery. The generated .xcodeproj is intentionally ignored;
# regenerate with `(cd apps/UIGallery && xcodegen generate)`.
name: NMPUIGallery
options:
  bundleIdPrefix: com.nmp.ui.gallery
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
packages:
  NMP:
    path: ../../Packages/NMP
targets:
  NMPUIGallery:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/NMPUIGallery
    dependencies:
      - package: NMP
        product: NMP
      - package: NMP
        product: NMPContent
      - package: NMP
        product: NMPUI
    info:
      path: Generated-Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: NMP UI
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nmp.ui.gallery
        TARGETED_DEVICE_FAMILY: "1"
  NMPUIGalleryUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/NMPUIGalleryUITests
    dependencies:
      - target: NMPUIGallery
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nmp.ui.gallery.uitests
        TEST_TARGET_NAME: NMPUIGallery
